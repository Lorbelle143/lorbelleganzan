<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Lorbelle Ganzan</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #6c63ff;
      --accent-dark: #5a52d5;
      --font: 'Inter', 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font);
      background: #0a0a14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .glow {
      position: fixed;
      top: -150px; right: -150px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 65%);
      pointer-events: none;
    }
    .glow-2 {
      position: fixed;
      bottom: -100px; left: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 65%);
      pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; padding: 2rem; }
    .num {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .msg {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }
    .btn-home {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 13px 30px;
      border-radius: 50px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(108,99,255,0.3);
    }
    .btn-home:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(108,99,255,0.4);
      color: #fff;
    }
    .brand {
      display: block;
      margin-bottom: 32px;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .brand span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow-2"></div>
  <div class="wrap">
    <a class="brand" href="/">LG<span>.</span></a>
    <div class="num">404</div>
    <p class="msg">Oops! The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn-home">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>
</body>
</html>
